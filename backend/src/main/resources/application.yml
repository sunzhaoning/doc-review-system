server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: doc-review-system
  
  profiles:
    active: dev
  
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/docreview}
    username: ${DB_USERNAME:docreview}
    password: ${DB_PASSWORD:docreview123}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.docreview.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false
  is-read-header: true
  is-read-cookie: false

knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-swagger-models: true
    enable-document-manage: true
    swagger-model-name: 实体类列表

file:
  max-size: 52428800
  allowed-types: pdf,docx,doc,xlsx,xls,pptx,ppt,txt,md
  max-image-size: 5242880
  allowed-image-types: jpg,jpeg,png,gif,webp

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET:doc-review}

ldap:
  enabled: false
  url: ldap://localhost:389
  base-dn: dc=company,dc=com
  bind-dn: cn=admin,dc=company,dc=com
  bind-password: 
  user-attribute: sAMAccountName
  email-attribute: mail
  name-attribute: cn

security:
  encrypt-key: ${ENCRYPT_SECRET_KEY:doc-review-system-secret}

logging:
  level:
    com.docreview: debug
    org.springframework.web: info
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
