# ====================================
# 文档评审系统 - 日志轮转配置
# 安装: sudo cp logrotate.conf /etc/logrotate.d/doc-review-system
# 测试: sudo logrotate -d /etc/logrotate.d/doc-review-system
# ====================================

/var/log/doc-review/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0644 root root
    sharedscripts
    postrotate
        # 通知后端服务重新打开日志文件
        docker exec doc-review-backend kill -USR1 1 2>/dev/null || true
    endscript
}

# Docker 容器日志
/var/lib/docker/containers/*/*.log {
    daily
    missingok
    rotate 7
    compress
    delaycompress
    notifempty
    copytruncate
    maxsize 100M
}
